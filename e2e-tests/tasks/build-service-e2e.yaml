---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-service-e2e-tests
spec:
  description: |
    This task runs build-service E2E tests from the build-service repository itself,
    using the in-repo test framework under test/e2e/. It sets up the environment,
    loads secrets, and executes the Go tests with a Ginkgo label filter.
  params:
    - name: cluster-access-secret-name
      type: string
      default: ""
      description: "The name of the secret containing the kubeconfig to access the target cluster."
    - name: test-name
      type: string
      description: "The name of the test being executed."
    - name: git-url
      type: string
      default: "https://github.com/konflux-ci/build-service.git"
      description: "The URL of the build-service Git repository."
    - name: git-revision
      type: string
      default: "main"
      description: "The revision (branch, tag, or SHA) to checkout."
    - name: oras-container
      type: string
      description: "The URI of the OCI container registry to store test artifacts."
      default: "quay.io/org/rhtap-e2e-artifacts"
    - name: job-spec
      type: string
      description: "The job specification containing details of the test execution."
    - name: component-image
      type: string
      description: 'Container image built from the build-service PR.'
      default: "none"
    - name: e2e-timeout
      description: "Timeout value for running E2E script"
      default: "120m"
    - name: test-environment
      type: string
      description: "Name of the environment the testing should be performed in."
      default: "upstream"
    - name: ginkgo-procs
      description: "Number of parallel Ginkgo test processes"
      default: "10"
    - name: e2e-extra-label-filter
      type: string
      description: |
        Additional Ginkgo label expression to narrow down which tests to run.
        Combined with the base label filter (build-service) using '&&'.
        Examples: "github", "gitlab", "pac-build", "github && pac-build".
        Leave empty to run all tests matching the base filter.
      default: ""
  volumes:
    - name: konflux-ci-secrets-volume
      secret:
        secretName: konflux-e2e-secrets
    - name: konflux-infra-secrets-volume
      secret:
        secretName: konflux-test-infra
    - name: cluster-secret-volume
      secret:
        optional: true
        secretName: $(params.cluster-access-secret-name)
  steps:
    - name: e2e-test
      computeResources:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "2"
          memory: "6Gi"
      image: quay.io/redhat-user-workloads/konflux-qe-team-tenant/konflux-e2e/konflux-e2e-tests:latest
      volumeMounts:
        - name: konflux-ci-secrets-volume
          mountPath: /usr/local/konflux-ci-secrets
        - name: konflux-infra-secrets-volume
          mountPath: /usr/local/konflux-test-infra
        - name: cluster-secret-volume
          mountPath: /tmp/kubeconfig
          subPath: kubeconfig
      workingDir: /workspace/source
      env:
        - name: JOB_NAME
          value: $(params.test-name)
        - name: GIT_URL
          value: $(params.git-url)
        - name: GIT_REVISION
          value: $(params.git-revision)
        - name: KONFLUX_CI
          value: "true"
        - name: JOB_SPEC
          value: $(params.job-spec)
        - name: COMPONENT_IMAGE
          value: $(params.component-image)
        - name: ORAS_CONTAINER
          value: $(params.oras-container)
        - name: ARTIFACT_DIR
          value: /workspace/artifact-dir
        - name: E2E_TIMEOUT
          value: $(params.e2e-timeout)
        - name: TEST_ENVIRONMENT
          value: $(params.test-environment)
        - name: KUBECONFIG
          value: /tmp/kubeconfig
        - name: IMAGE_TAG_EXPIRATION
          value: "5d"
        - name: GINKGO_PROCS
          value: $(params.ginkgo-procs)
        - name: E2E_EXTRA_LABEL_FILTER
          value: $(params.e2e-extra-label-filter)
      onError: continue
      script: |
        #!/bin/bash

        set -euo pipefail

        log() {
            echo -e "[$(date +'%Y-%m-%d %H:%M:%S')] [$1] $2"
        }
        export -f log

        export GITHUB_TOKEN

        PREVIOUS_RATE_REMAINING=0

        IFS=',' read -r -a GITHUB_ACCOUNTS_ARRAY <<< "$(cat /usr/local/konflux-ci-secrets/github_accounts)"
        for account in "${GITHUB_ACCOUNTS_ARRAY[@]}"; do
            IFS=':' read -r -a GITHUB_USERNAME_ARRAY <<< "$account"

            GH_RATE_REMAINING=$(curl -s \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_USERNAME_ARRAY[1]}" \
                https://api.github.com/rate_limit | jq ".rate.remaining")

            log "INFO" "user: ${GITHUB_USERNAME_ARRAY[0]} with rate limit remaining $GH_RATE_REMAINING"
            if [[ "$GH_RATE_REMAINING" -ge "$PREVIOUS_RATE_REMAINING" ]]; then
                GITHUB_USER="${GITHUB_USERNAME_ARRAY[0]}"
                GITHUB_TOKEN="${GITHUB_USERNAME_ARRAY[1]}"
            fi
            PREVIOUS_RATE_REMAINING="$GH_RATE_REMAINING"
        done

        log "INFO" "running tests with github user: ${GITHUB_USER}"

        git config --global --add safe.directory /workspace/source
        git config --global user.name "redhat-appstudio-qe-bot"
        git config --global user.email redhat-appstudio-qe-bot@redhat.com

        mkdir -p "${HOME}/creds"
        git_creds_path="${HOME}/creds/file"
        git config --global credential.helper "store --file $git_creds_path"
        echo "https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com" > "$git_creds_path"

        git clone "${GIT_URL}" /workspace/source
        cd /workspace/source
        git checkout "${GIT_REVISION}"

        mkdir -p "${ARTIFACT_DIR}"

        /bin/bash -c "e2e-tests/scripts/build-service-e2e.sh"
    - name: secure-push-oci
      ref:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog.git
          - name: revision
            value: main
          - name: pathInRepo
            value: stepactions/secure-push-oci/0.1/secure-push-oci.yaml
      params:
        - name: workdir-path
          value: /workspace/artifact-dir
        - name: oci-ref
          value: $(params.oras-container)
        - name: credentials-volume-name
          value: konflux-infra-secrets-volume
    - name: fail-if-any-step-failed
      ref:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog.git
          - name: revision
            value: main
          - name: pathInRepo
            value: stepactions/fail-if-any-step-failed/0.1/fail-if-any-step-failed.yaml
